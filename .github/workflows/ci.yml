name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install pytest
      - name: Lint
        run: python -m py_compile x_layer.py admissibility_graph.py pressure_monitor.py c_rotation.py mutation_boundary.py constraint_declaration.py halt_hold_logic.py corridor.py
      - name: Test
        run: pytest -v
